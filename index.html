<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消防業務支援マップ</title>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- turf.js（距離・面積計算） -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Chart.js（グラフ描画） -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 共通ナビゲーションバー -->
  <nav id="global-nav">
    <span class="nav-brand">横浜市消防局 GIS</span>
    <a href="index.html" class="nav-link">既存マップ</a>
    <a href="dispatch.html" class="nav-link">指令管制</a>
    <a href="prevention.html" class="nav-link">予防管理</a>
    <a href="dashboard.html" class="nav-link">ダッシュボード</a>
  </nav>

  <div id="map"></div>

  <!-- 住所・キーワード検索バー（上部中央）-->
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="住所・施設名・管理番号で検索..." />
    <button id="search-btn">検索</button>
    <button id="search-clear-btn" title="クリア">✕</button>
  </div>

  <!-- レイヤ表示制御パネル（左側）-->
  <div id="layer-panel">
    <h3>レイヤ表示</h3>
    <div id="layer-groups"></div>
  </div>

  <!-- 計測ボタン（左下）-->
  <button id="measure-btn" title="距離・面積を計測">📏 計測</button>

  <!-- 分析ボタン群（左下・計測ボタンの上）-->
  <div id="analysis-btns">
    <button id="pickup-btn">📍 出張所ピックアップ</button>
    <button id="heatmap-btn">🔥 水利ヒートマップ</button>
    <button id="stats-btn">📊 火災分析</button>
  </div>

  <!-- 出張所ピックアップ結果パネル（左下）-->
  <div id="pickup-result" style="display:none;">
    <button id="pickup-clear-btn">✕ クリア</button>
  </div>

  <!-- 火災分析パネル（右側・スライドイン）-->
  <div id="stats-panel">
    <div class="stats-panel-header">
      <span>📊 火災調査分析</span>
    </div>
    <div class="stats-filter-row">
      <select id="fire-filter-year">
        <option value="all">全期間</option>
      </select>
      <select id="fire-filter-month">
        <option value="all">全月</option>
        <option value="01">1月</option><option value="02">2月</option>
        <option value="03">3月</option><option value="04">4月</option>
        <option value="05">5月</option><option value="06">6月</option>
        <option value="07">7月</option><option value="08">8月</option>
        <option value="09">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
      <span id="fire-summary-count" class="stats-count">0 件</span>
    </div>
    <div class="chart-wrap"><canvas id="fire-chart"></canvas></div>
    <div class="chart-wrap chart-wrap-sm"><canvas id="fire-cause-chart"></canvas></div>
  </div>

  <!-- 計測結果表示（下部中央）-->
  <div id="measure-result" style="display:none;"></div>

  <!-- モバイル用パネルトグルボタン -->
  <button id="layer-toggle-btn" class="panel-toggle-btn" title="レイヤ表示">☰</button>
  <button id="panel-toggle-btn" class="panel-toggle-btn panel-toggle-right" title="コントロール">⚙</button>

  <!-- 動態情報バー（上部左）-->
  <div id="vehicle-bar">
    <span id="vehicle-updated">車両動態: 読込中...</span>
    <button id="vehicle-polling-btn" class="active">⏸ 更新停止</button>
  </div>

  <!-- 災害受信票モーダル -->
  <div id="incident-modal" style="display:none;">
    <div id="incident-modal-inner">
      <div id="incident-modal-header">
        <span>災害受信票</span>
        <button id="incident-modal-close">✕</button>
      </div>
      <div id="incident-modal-body"></div>
    </div>
  </div>

  <!-- コントロールパネル（右側）-->
  <div id="panel">
    <h2>消防業務支援マップ</h2>

    <div class="control-group">
      <label for="style-select">スタイル</label>
      <select id="style-select">
        <option value="https://demotiles.maplibre.org/style.json">MapLibre Demo</option>
        <option value="https://tile.openstreetmap.jp/styles/osm-bright/style.json">OSM Bright (Japan)</option>
      </select>
    </div>

    <div class="control-group">
      <label>現在地へ移動</label>
      <button id="btn-geolocate">現在地</button>
    </div>

    <div class="control-group">
      <label>主要都市</label>
      <div class="city-buttons">
        <button class="city-btn" data-lng="139.6380" data-lat="35.4437" data-zoom="14">横浜</button>
        <button class="city-btn" data-lng="139.6917" data-lat="35.6895" data-zoom="10">東京</button>
        <button class="city-btn" data-lng="135.5022" data-lat="34.6937" data-zoom="10">大阪</button>
        <button class="city-btn" data-lng="136.9066" data-lat="35.1802" data-zoom="10">名古屋</button>
      </div>
    </div>

    <div class="control-group">
      <label>受信票表示</label>
      <button id="toggle-completed-btn">完了事案を非表示</button>
    </div>

    <div class="control-group">
      <label>
        水利障害
        <span id="obstacle-badge" class="badge">0</span>
      </label>
      <div id="obstacle-summary" class="info-box obstacle-info">読込中...</div>
    </div>

    <div id="coords" class="info-box">
      <span id="lng-lat">---</span><br />
      Zoom: <span id="zoom-level">---</span>
    </div>
  </div>

  <script src="layers.js"></script>
  <script src="search.js"></script>
  <script src="measure.js"></script>
  <script src="vehicles.js"></script>
  <script src="incidents.js"></script>
  <script src="obstacles.js"></script>
  <script src="analysis.js"></script>
  <script src="fire-stats.js"></script>
  <script src="main.js"></script>
</body>
</html>
